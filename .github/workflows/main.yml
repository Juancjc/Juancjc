name: Generate contribution animations

on:
  schedule:
    # Roda a cada 12 horas (00:00 e 12:00 UTC)
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate snake + pacman SVGs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake animation (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: Juancjc
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#64FFDA
            dist/github-contribution-grid-snake-dark.svg?color_snake=#64FFDA&palette=github-dark

      - name: Generate Pac-Man animation (light + dark)
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Juancjc

      - name: Push generated SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
